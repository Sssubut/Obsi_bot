version: "3.8"

services:
  obsidian-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obsidian-bot-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_ALLOWED_USER=${TELEGRAM_ALLOWED_USER} # Set to your Telegram Username (e.g. "myusername")
    volumes:
      # Mount Obsidian Vault directly so files synced by Telegram bot are immediately available in Obsidian
      - obsidian-vault-data:/usr/src/app/vault
      - metadata-cache-data:/usr/src/app/metadata

volumes:
  obsidian-vault-data:
    driver: local
  metadata-cache-data:
    driver: local
